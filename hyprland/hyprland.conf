# home/hyprland/hyprland.conf
# Normale Hyprland-Syntax
# Weitere Infos: https://wiki.hyprland.org

# ── Andere Config-Dateien einbinden ─────────────────────────
source = ~/.config/hypr/binds.conf

# ── Monitor ──────────────────────────────────────────────────
monitor=,preferred,auto,1

# ── Programme beim Start ─────────────────────────────────────
exec-once = waybar
exec-once = dunst
exec-once = openrgb --startminimized

# ── Umgebungsvariablen ───────────────────────────────────────
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland

# ── Allgemein ────────────────────────────────────────────────
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    layout = dwindle
}

# ── Aussehen ─────────────────────────────────────────────────
decoration {
    rounding = 10

    blur {
        enabled = true
        size = 8
        passes = 2
    }

    shadow {
        enabled = true
    }
}

# ── Animationen ──────────────────────────────────────────────
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# ── Layout ───────────────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
}
